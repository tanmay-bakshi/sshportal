name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all --check
      - run: cargo clippy --locked --all-targets --all-features -- -D warnings

  test:
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - if: matrix.os != 'windows-latest'
        uses: Swatinem/rust-cache@v2
      - if: matrix.os != 'windows-latest'
        run: cargo test --locked
      - if: matrix.os == 'windows-latest'
        run: cargo test --locked platform::tests -- --nocapture
      - if: matrix.os == 'windows-latest'
        run: cargo test --locked keys::tests -- --nocapture
      - if: matrix.os == 'windows-latest'
        run: cargo test --locked websocket::tests -- --nocapture
      - if: matrix.os == 'windows-latest'
        timeout-minutes: 3
        run: cargo test --locked shell::tests::negotiates_socks5_domain_connect_request -- --nocapture
      - if: matrix.os == 'windows-latest'
        timeout-minutes: 3
        run: cargo test --locked shell::tests::rejects_unsupported_socks5_command -- --nocapture
      - if: matrix.os == 'windows-latest'
        timeout-minutes: 3
        run: cargo test --locked shell::tests::forwards_direct_tcpip_channels_to_client_network -- --nocapture
      - if: matrix.os == 'windows-latest'
        timeout-minutes: 3
        run: cargo test --locked shell::tests::executes_noninteractive_commands_over_authenticated_transport -- --nocapture
      - if: matrix.os == 'windows-latest'
        timeout-minutes: 3
        run: cargo test --locked shell::tests::reuses_authenticated_transport_for_multiple_shell_sessions -- --nocapture
      - if: matrix.os == 'windows-latest'
        timeout-minutes: 3
        run: cargo test --locked shell::tests::local_ssh_proxy_executes_noninteractive_commands -- --nocapture
      - if: matrix.os == 'windows-latest'
        timeout-minutes: 3
        run: cargo test --locked shell::tests::local_ssh_proxy_accepts_repeated_sessions_over_one_client_transport -- --nocapture

  e2e-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - run: sudo apt-get update && sudo apt-get install --yes musl-tools
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: python3 tools/docker_e2e.py
